<!DOCTYPE html>
<html>
<head>
    <title>Simple Quiz Game</title>
    <style>
        body{
    font-family: Arial;
    background-color:bisque;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.quiz{
    background:white;
    padding:20px;
    width:350px;
    border-radius:10px;
    text-align:center;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

.option{
    display:block;
    margin:10px 0;
}
    </style>
</head>
<body>

<div class="quiz">
    <h2 id="question"></h2>

    <div id="options"></div>

    <button id="next">Next</button>

    <h3 id="score"></h3>
</div>

<script>
const questions = [
{
    question: "What does HTML stand for?",
    options: [
        "Hyper Text Markup Language",
        "Home Tool Markup Language",
        "Hyper Tool Machine Language",
        "High Text Language"
    ],
    answer: "Hyper Text Markup Language"
},

{
    question: "Which language is used for styling?",
    options: ["HTML","CSS","Java","Python"],
    answer: "CSS"
},

{
    question: "Which language is used for web interactivity?",
    options: ["CSS","JavaScript","C","SQL"],
    answer: "JavaScript"
}
];
let current = 0;
let score = 0;
const question = document.getElementById("question");
const options = document.getElementById("options");
const next = document.getElementById("next");
const scoreText = document.getElementById("score");
function loadQuestion(){
    question.innerText = questions[current].question;
    options.innerHTML = "";
    for(let i=0; i<questions[current].options.length; i++){
        let btn = document.createElement("button");
        btn.innerText = questions[current].options[i];
        btn.className = "option";
        btn.onclick = function(){

            if(btn.innerText == questions[current].answer){
                score++;
            }

            current++;

            if(current < questions.length){
                loadQuestion();
            }else{
                showScore();
            }
        }
        options.appendChild(btn);
    }
}

function showScore(){
    question.innerText = "Quiz Finished!";
    options.innerHTML = "";
    next.style.display = "none";
    scoreText.innerText =
    "Your Score : " + score + " / " + questions.length;
}
next.style.display = "none";
loadQuestion();    
</script>
</body>
</html>
